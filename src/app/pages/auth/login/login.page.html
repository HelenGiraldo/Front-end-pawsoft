<ion-content class="login-content" [fullscreen]="true">
  <div class="center-container">
    <div class="login-wrapper">

      <!-- Logo -->
      <div class="logo-section">
        <h1>Paw<span>Soft</span></h1>
        <p>Sistema de Gestión Veterinaria</p>
      </div>

      <!-- Card Login -->
      <div class="login-card">
        <h2>Iniciar Sesión</h2>

        <ion-item lines="none" class="input-item">
          <ion-label position="stacked">Correo electrónico</ion-label>
          <ion-input
            type="email"
            placeholder="ejemplo@correo.com"
            [(ngModel)]="email"
            [disabled]="cargando">
          </ion-input>
        </ion-item>

        <ion-item lines="none" class="input-item">
          <ion-label position="stacked">Contraseña</ion-label>
          <ion-input
            type="password"
            placeholder="••••••••"
            [(ngModel)]="password"
            [disabled]="cargando">
          </ion-input>
        </ion-item>

        <!-- Spinner mientras carga -->
        <div class="loading" *ngIf="cargando">
          <ion-spinner name="crescent"></ion-spinner>
          <span>Cargando...</span>
        </div>

        <p *ngIf="errorMsg && !cargando" class="error-message">
          {{ errorMsg }}
        </p>

        <ion-button
          expand="block"
          class="login-btn"
          (click)="login()"
          [disabled]="cargando || !email || !password.trim()">
          {{ cargando ? 'Ingresando...' : 'Ingresar' }}
        </ion-button>

        <div class="forgot" (click)="recuperarContrasena()" [class.disabled]="cargando">
          ¿Olvidaste tu contraseña?
        </div>

        <div class="register" (click)="irRegistro()" [class.disabled]="cargando">
          ¿No tienes cuenta? <span>Regístrate</span>
        </div>
      </div>
    </div>
  </div>



  <!-- OTP Modal -->
  <app-otp-modal
    [isVisible]="mostrarOtp"
    [email]="correoUsuario"
    (validate)="handleOtpValidado($event)"
    (successRedirect)="handleSuccessRedirect()"
    (closed)="handleOtpCerrado()"
    (resend)="handleReenvio()">
  </app-otp-modal>
</ion-content>
